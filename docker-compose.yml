version: '3.8'

services:
  # 1. โกดังข้อมูล (Data Warehouse)
  postgres_dw:
    image: postgres:15-alpine
    container_name: postgres_dw
    ports:
      - "5435:5432"
    environment:
      - POSTGRES_USER=engineer
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=data_warehouse
    volumes:
      - dw_data:/var/lib/postgresql/data
    networks:
      - data_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engineer -d data_warehouse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. เครื่องมือสร้าง Dashboard (Metabase)
  metabase:
    image: metabase/metabase:latest
    container_name: metabase_chinook_northwind
    user: "root"
    ports:
      - "3001:3000"
    depends_on:
      postgres_dw:
        condition: service_healthy
    environment:                           
      - MB_DB_FILE=/metabase-data/metabase.db 
    volumes:                               
      - metabase_data:/metabase-data
    networks:
      - data_network

  # 3. ตัวจัดการ Pipeline (Prefect Server)
  prefect_server:
    image: prefecthq/prefect:3-latest
    container_name: prefect_server
    command: prefect server start --host 0.0.0.0
    environment:
      - PREFECT_UI_API_URL=http://localhost:4201/api
    ports:
      - "4201:4200"
    networks:
      - data_network

  # 4. ตัวทดลองเขียนโค้ด (Jupyter Notebook)
  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: jupyter_dev
    user: root
    environment:
      - JUPYTER_TOKEN=prefect
      - IN_DOCKER=true
    volumes:
      - .:/home/jovyan/work
    ports:
      - "8088:8888"
    networks:
      - data_network

  # 5. ตัวรัน Pipeline (Build จาก Dockerfile)
  etl_runner:
    build: .
    container_name: etl_runner
    depends_on:
      postgres_dw:
        condition: service_healthy
      prefect_server:
        condition: service_started
    environment:
      - PREFECT_API_URL=http://prefect_server:4200/api
      - IN_DOCKER=true
      - POSTGRES_USER=engineer
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=data_warehouse
    networks:
      - data_network

volumes:
  dw_data:
  metabase_data: 

networks:
  data_network:
    driver: bridge