version: '3.8'

services:
  # 1. โกดังข้อมูล (Data Warehouse)
  postgres_dw:
    image: postgres:15-alpine
    container_name: postgres_dw
    env_file: .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - dw_data:/var/lib/postgresql/data
    networks:
      - data_network

  # 2. เครื่องมือสร้าง Dashboard (Metabase)
  metabase:
    image: metabase/metabase:latest
    container_name: metabase_chinook_northwind
    ports:
      - "3001:3000"
    depends_on:
      - postgres_dw
    # <--- [เพิ่ม] ตั้งค่าให้ Metabase เซฟไฟล์ระบบไว้ข้างนอก
    environment:                           
      - MB_DB_FILE=/metabase-data/metabase.db 
    # <--- [เพิ่ม] ผูกโฟลเดอร์เก็บข้อมูลถาวรให้ Metabase
    volumes:                               
      - metabase_data:/metabase-data
    networks:
      - data_network

  # 3. ตัวจัดการ Pipeline (Prefect Server)
  prefect_server:
    image: prefecthq/prefect:3-latest
    container_name: prefect_server
    command: prefect server start --host 0.0.0.0
    environment:
      - PREFECT_UI_API_URL=http://localhost:4201/api
    ports:
      - "4201:4200"
    networks:
      - data_network

  # 4. ตัวทดลองเขียนโค้ด (Jupyter Notebook)
  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: jupyter_dev
    user: root
    environment:
      - JUPYTER_TOKEN=${JUPYTER_TOKEN}
      - IN_DOCKER=true  # <--- [เพิ่ม] เพื่อให้ Jupyter รู้ว่าต้องต่อ Host ชื่อ postgres_dw
    volumes:
      - .:/home/jovyan/work
    ports:
      - "8088:8888"
    networks:
      - data_network

  # 5. ตัวรัน Pipeline (Build จาก Dockerfile)
  etl_runner:
    build: .
    container_name: etl_runner
    depends_on:
      - prefect_server
      - postgres_dw
    env_file: .env
    environment:
      - PREFECT_API_URL=http://prefect_server:4200/api
      - IN_DOCKER=true
    # <--- [เพิ่ม] หน่วงเวลา 15 วินาทีรอ Prefect พร้อม แล้วค่อยรันโค้ดอัตโนมัติ
    command: bash -c "sleep 15 && python ETL_pipeline.py" 
    networks:
      - data_network

# <--- [เพิ่ม] ประกาศสร้างพื้นที่เก็บข้อมูลถาวร
volumes:
  dw_data:
  metabase_data: 

networks:
  data_network:
    driver: bridge